<html lang="es">
  <head>

    <title>Formularios</title>
    <link rel="stylesheet" href="../../css formularios/formulario1.css" />
  </head>

  <body>

      <h2 id="h2">Formulario basico</h2>

      <section id="form1">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Escriba su nombre" />

        <label for="password">Contraseña</label>

        <input type="email" id="mail" placeholder="Escriba su correo" />
      </section>
    </div>
